name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # 🔐 Docker login
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # =========================
      # 🐳 BACKEND BUILD + PUSH
      # =========================
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/legal-app:latest .

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/legal-app:latest

      # =========================
      # 🧪 BACKEND TEST
      # =========================
      - name: Run Backend Container
        run: docker run -d -p 4567:4567 --name backend-container ${{ secrets.DOCKER_USERNAME }}/legal-app:latest

      - name: Wait for backend
        run: sleep 10

      - name: Test Backend API
        run: |
          curl http://localhost:4567
          curl http://localhost:4567/cases

      # =========================
      # 🎨 FRONTEND BUILD + PUSH
      # =========================
      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/legal-frontend:latest ./frontend

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/legal-frontend:latest

      # =========================
      # ☁️ DEPLOY TO EC2 (K8s)
      # =========================
      - name: Deploy to Kubernetes
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd legal-app
            git pull

            # Backend
            kubectl apply -f k8s/deployment.yaml
            kubectl apply -f k8s/service.yaml

            # Frontend
            kubectl apply -f k8s/frontend-deployment.yaml
            kubectl apply -f k8s/frontend-service.yaml

            # Restart
            kubectl rollout restart deployment legal-app-deployment
            kubectl rollout restart deployment frontend-deployment