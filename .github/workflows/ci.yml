name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # 🔐 Docker login
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🐳 Build image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/legal-app:latest .

      # 🚀 Push image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/legal-app:latest

      # 🧪 Run container (optional test)
      - name: Run container
        run: docker run -d -p 4567:4567 --name legal-container ${{ secrets.DOCKER_USERNAME }}/legal-app:latest

      - name: Wait for app
        run: sleep 10

      - name: Test API
        run: |
          curl http://localhost:4567
          curl http://localhost:4567/cases

      # ☁️ Deploy to EC2 (K8s)
      - name: Deploy to Kubernetes
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd YOUR_REPO_NAME
            kubectl apply -f k8s/deployment.yaml
            kubectl apply -f k8s/service.yaml
            kubectl rollout restart deployment legal-app-deployment